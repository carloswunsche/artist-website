<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carlos Wunsche</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c8a96e'/%3E%3Cpath d='M16 8v8.55A4 4 0 1 0 18 17V12h4V8h-6z' fill='%23000'/%3E%3C/svg%3E">
</head>
<body>
<div class="wrap"><div id="root"><p class="msg">Loading…</p></div></div>

<div id="bar">
  <audio id="aud"></audio>
  <div class="b-art"><strong id="b-title">—</strong><span id="b-sub"></span></div>
  <div class="b-center">
    <div class="b-ctrl">
      <button class="ic-btn" id="b-prev" onclick="skip(-1)">
        <svg width="16" height="16" fill="currentColor"><use href="icons.svg#prev"/></svg>
      </button>
      <button class="ic-btn play-btn" id="b-pp" onclick="togglePlay()">
        <svg id="ico-play" width="16" height="16" fill="currentColor" style="display:block"><use href="icons.svg#play"/></svg>
        <svg id="ico-pause" width="16" height="16" fill="currentColor" style="display:none"><use href="icons.svg#pause"/></svg>
      </button>
      <button class="ic-btn" id="b-next" onclick="skip(1)">
        <svg width="16" height="16" fill="currentColor"><use href="icons.svg#next"/></svg>
      </button>
    </div>
    <div class="b-prog">
      <span class="time" id="b-cur">0:00</span>
      <input type="range" id="b-seek" min="0" max="100" value="0" step="0.1">
      <span class="time" id="b-dur">0:00</span>
    </div>
  </div>
  <div class="b-right">
    <button class="lyrics-btn" id="lyrics-btn" onclick="toggleLyrics()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><use href="icons.svg#lyrics"/></svg>
      Lyrics
    </button>
  </div>
</div>

<div class="lyrics-panel" id="lyrics-panel">
  <div class="lyrics-header">Lyrics</div>
  <div class="lyrics-scroll" id="lyrics-scroll">
    <div class="lyrics-text" id="lyrics-text"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
