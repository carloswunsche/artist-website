<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carlos Wunsche</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e9e82'/%3E%3Ctext x='16' y='24' font-family='system-ui,sans-serif' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3ECW%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="wrap"><div id="root"><p class="msg">Loading…</p></div></div>

<!-- Player bar -->
<div id="bar">
  <audio id="aud"></audio>
  <div class="p-thumb">
    <img id="p-cover" src="" style="display:none">
    <div class="p-thumb-placeholder"></div>
  </div>
  <div class="p-info">
    <strong id="b-title">—</strong>
    <span id="b-sub">—</span>
  </div>
  <div class="p-ctrls">
    <button class="ic-btn" id="b-prev">
      <svg width="20" height="20" fill="currentColor"><use href="icons.svg#prev"/></svg>
    </button>
    <button class="ic-btn play-btn" id="b-pp">
      <svg id="ico-play" width="20" height="20" fill="currentColor"><use href="icons.svg#play"/></svg>
      <svg id="ico-pause" width="20" height="20" fill="currentColor" style="display:none"><use href="icons.svg#pause"/></svg>
    </button>
    <button class="ic-btn" id="b-next">
      <svg width="20" height="20" fill="currentColor"><use href="icons.svg#next"/></svg>
    </button>
  </div>
  <div class="p-prog">
    <span class="time" id="b-cur">0:00</span>
    <div class="p-bar" id="pbar">
      <div class="p-fill" id="pfill"></div>
    </div>
    <span class="time" id="b-dur">0:00</span>
  </div>
  <div class="p-vol">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><use href="icons.svg#volume"/></svg>
    <input type="range" class="vol-range" id="vol-slider" min="0" max="100" value="80">
  </div>
  <button class="lyrics-btn" id="lyrics-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><use href="icons.svg#lyrics"/></svg>
    Lyrics
  </button>
</div>

<!-- Lyrics panel -->
<div class="lyrics-panel" id="lyrics-panel">
  <div class="lyrics-header">Lyrics</div>
  <div class="lyrics-scroll" id="lyrics-scroll">
    <div class="lyrics-text" id="lyrics-text"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
